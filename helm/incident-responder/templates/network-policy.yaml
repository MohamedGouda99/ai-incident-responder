{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "incident-responder.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "incident-responder.backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "incident-responder.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "incident-responder.frontend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "incident-responder.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "incident-responder.frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "incident-responder.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
{{- end }}
