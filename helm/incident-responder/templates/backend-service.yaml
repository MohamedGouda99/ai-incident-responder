apiVersion: v1
kind: Service
metadata:
  name: {{ include "incident-responder.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "incident-responder.backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "incident-responder.backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
