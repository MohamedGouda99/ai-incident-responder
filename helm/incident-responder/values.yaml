# -- Global settings
global:
  # -- Image pull secrets for private registries
  imagePullSecrets: []

# -- Create namespace
createNamespace: false

# -- Override the release name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# -- Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# =============================================================================
# Backend Configuration
# =============================================================================
backend:
  # -- Number of backend replicas
  replicaCount: 2

  image:
    repository: ghcr.io/mohamedgouda99/incident-responder-backend
    tag: latest
    pullPolicy: Always

  # -- Use an existing secret instead of creating one
  existingSecret: ""

  service:
    type: ClusterIP
    port: 8000

  # -- Environment variables from ConfigMap
  config:
    OPENAI_MODEL: "gpt-4"
    CORS_ORIGINS: "https://incident-responder.example.com"
    CHROMA_PERSIST_DIR: "/app/chroma_data"

  # -- Secret environment variables (ignored if existingSecret is set)
  secrets:
    OPENAI_API_KEY: "change-me-to-your-actual-key"

  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # -- Liveness probe configuration
  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  # -- Readiness probe configuration
  readinessProbe:
    httpGet:
      path: /api/v1/health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  # -- Autoscaling configuration
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  # -- Pod Disruption Budget
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # -- Node selector for backend pods
  nodeSelector: {}

  # -- Tolerations for backend pods
  tolerations: []

  # -- Affinity rules for backend pods
  affinity: {}

  # -- Pod annotations
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"

  # -- Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  # -- Container security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  # -- Rolling update strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

# =============================================================================
# Frontend Configuration
# =============================================================================
frontend:
  # -- Number of frontend replicas
  replicaCount: 2

  image:
    repository: ghcr.io/mohamedgouda99/incident-responder-frontend
    tag: latest
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # -- Liveness probe configuration
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  # -- Readiness probe configuration
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  # -- Node selector for frontend pods
  nodeSelector: {}

  # -- Tolerations for frontend pods
  tolerations: []

  # -- Affinity rules for frontend pods
  affinity: {}

  # -- Pod annotations
  podAnnotations: {}

  # -- Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101

  # -- Container security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE

  # -- Rolling update strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

# =============================================================================
# Ingress Configuration
# =============================================================================
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: incident-responder.example.com
  tls:
    enabled: true
    secretName: incident-responder-tls

# =============================================================================
# Network Policy Configuration
# =============================================================================
networkPolicy:
  enabled: true
