apiVersion: v1
kind: Service
metadata:
  name: incident-responder-backend
  namespace: incident-responder
  labels:
    app.kubernetes.io/name: incident-responder
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: ai-incident-responder
    app.kubernetes.io/managed-by: kubectl
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: incident-responder
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
