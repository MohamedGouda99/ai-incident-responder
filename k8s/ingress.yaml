apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: incident-responder
  namespace: incident-responder
  labels:
    app.kubernetes.io/name: incident-responder
    app.kubernetes.io/part-of: ai-incident-responder
    app.kubernetes.io/managed-by: kubectl
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - incident-responder.example.com
      secretName: incident-responder-tls
  rules:
    - host: incident-responder.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: incident-responder-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: incident-responder-frontend
                port:
                  number: 80
