apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-network-policy
  namespace: incident-responder
  labels:
    app.kubernetes.io/name: incident-responder
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: ai-incident-responder
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: incident-responder
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: incident-responder
              app.kubernetes.io/component: frontend
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-network-policy
  namespace: incident-responder
  labels:
    app.kubernetes.io/name: incident-responder
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: ai-incident-responder
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: incident-responder
      app.kubernetes.io/component: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
