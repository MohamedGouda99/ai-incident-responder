apiVersion: v1
kind: Service
metadata:
  name: incident-responder-frontend
  namespace: incident-responder
  labels:
    app.kubernetes.io/name: incident-responder
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: ai-incident-responder
    app.kubernetes.io/managed-by: kubectl
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: incident-responder
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
